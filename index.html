<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OptionsAI" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>OptionsAI — Analizador</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --bg3: #1a1a26;
      --border: rgba(255,255,255,0.08);
      --accent: #00ff88;
      --accent2: #00c4ff;
      --red: #ff4466;
      --text: #f0f0f5;
      --muted: rgba(240,240,245,0.45);
      --card: rgba(255,255,255,0.04);
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

    /* SPLASH */
    #splash {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; transition: opacity 0.5s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    .splash-logo { font-family: 'Space Mono', monospace; font-size: 32px; color: var(--accent); letter-spacing: -1px; margin-bottom: 8px; }
    .splash-sub { font-size: 13px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .splash-bar { width: 120px; height: 2px; background: var(--bg3); border-radius: 2px; margin-top: 32px; overflow: hidden; }
    .splash-fill { height: 100%; background: var(--accent); animation: fillbar 1.5s ease forwards; }
    @keyframes fillbar { from{width:0} to{width:100%} }

    /* MAIN */
    #app { min-height: 100dvh; display: flex; flex-direction: column; }

    /* HEADER */
    header {
      padding: 52px 20px 16px;
      background: linear-gradient(180deg, rgba(0,255,136,0.06) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .logo { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--accent); }
    .badge { font-size: 10px; background: rgba(0,255,136,0.12); color: var(--accent); padding: 3px 8px; border-radius: 20px; border: 1px solid rgba(0,255,136,0.2); letter-spacing: 1px; text-transform: uppercase; }
    .header-sub { font-size: 12px; color: var(--muted); }

    /* CONTENT */
    .content { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* FORM CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      backdrop-filter: blur(10px);
    }
    .card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; font-family: 'Space Mono', monospace; }

    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }

    input[type=text], input[type=number], select {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: rgba(0,255,136,0.4); }
    input::placeholder { color: var(--muted); }
    .ticker-input { font-family: 'Space Mono', monospace; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* BUTTON */
    .btn-analyze {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .btn-analyze:active { transform: scale(0.97); opacity: 0.9; }
    .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

    /* LOADING */
    .loading { display: none; align-items: center; gap: 12px; padding: 16px; }
    .loading.show { display: flex; }
    .dots { display: flex; gap: 5px; }
    .dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: dp 1.2s infinite; }
    .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
    @keyframes dp{0%,80%,100%{opacity:.15;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
    .loading-txt { font-size: 13px; color: var(--muted); }

    /* RESULT */
    #result { display: none; }
    #result.show { display: flex; flex-direction: column; gap: 12px; }

    /* REC CARD */
    .rec-card {
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .rec-call { background: linear-gradient(135deg, rgba(0,255,136,0.12), rgba(0,255,136,0.04)); border: 1px solid rgba(0,255,136,0.25); }
    .rec-put { background: linear-gradient(135deg, rgba(255,68,102,0.12), rgba(255,68,102,0.04)); border: 1px solid rgba(255,68,102,0.25); }
    .rec-neutral { background: linear-gradient(135deg, rgba(0,196,255,0.12), rgba(0,196,255,0.04)); border: 1px solid rgba(0,196,255,0.25); }

    .rec-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .rec-ticker { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; }
    .rec-badge { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; padding: 5px 14px; border-radius: 20px; }
    .badge-call { background: rgba(0,255,136,0.2); color: var(--accent); border: 1px solid rgba(0,255,136,0.3); }
    .badge-put { background: rgba(255,68,102,0.2); color: var(--red); border: 1px solid rgba(255,68,102,0.3); }
    .badge-neutral { background: rgba(0,196,255,0.2); color: var(--accent2); border: 1px solid rgba(0,196,255,0.3); }

    .rec-price { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .rec-trend { font-size: 12px; color: var(--muted); }

    /* CONFIDENCE BAR */
    .conf-wrap { margin-top: 14px; }
    .conf-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .conf-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .conf-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }

    /* OPTION BOX */
    .option-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .opt-item { display: flex; flex-direction: column; gap: 3px; }
    .opt-key { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .opt-val { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; }

    /* EXIT TARGETS */
    .exit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .exit-card { border-radius: 12px; padding: 14px; text-align: center; }
    .exit-tp { background: rgba(0,255,136,0.06); border: 1px solid rgba(0,255,136,0.2); }
    .exit-sl { background: rgba(255,68,102,0.06); border: 1px solid rgba(255,68,102,0.2); }
    .exit-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .exit-tp .exit-label { color: var(--accent); }
    .exit-sl .exit-label { color: var(--red); }
    .exit-price { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; }
    .exit-pct { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* RISK BAR */
    .risk-wrap { margin-top: 4px; }
    .risk-label-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .risk-track { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
    .risk-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }

    /* ANALYSIS TEXT */
    .analysis-txt { font-size: 13px; color: rgba(240,240,245,0.75); line-height: 1.7; }

    /* LISTS */
    .cat-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
    .cat-list li { font-size: 13px; color: rgba(240,240,245,0.75); padding-left: 16px; position: relative; line-height: 1.5; }
    .cat-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-size: 11px; top: 2px; }
    .risk-list li::before { color: var(--red); }

    /* DISCLAIMER */
    .disclaimer { font-size: 11px; color: var(--muted); line-height: 1.6; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px solid var(--border); }

    /* BOTTOM NAV */
    .bottom-nav {
      position: sticky;
      bottom: 0;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 20px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      gap: 4px;
    }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px; border-radius: 10px; border: none; background: transparent; color: var(--muted); font-size: 10px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; }
    .nav-btn.active { color: var(--accent); background: rgba(0,255,136,0.08); }
    .nav-btn svg { width: 20px; height: 20px; }

    /* HISTORY PAGE */
    #page-history { display: none; }
    #page-history.active { display: block; }
    #page-form { display: block; }
    #page-form.hidden { display: none; }

    .history-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .history-empty svg { opacity: 0.3; margin-bottom: 12px; }
    .hist-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .hist-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .hist-ticker { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; }
    .hist-date { font-size: 11px; color: var(--muted); }
    .hist-bottom { display: flex; gap: 8px; }
    .hist-tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-family: 'Space Mono', monospace; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 0; }

    /* ANIMATIONS */
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">OPTIONS_AI</div>
  <div class="splash-sub">Analizador Semanal</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-top">
      <div class="logo">OPTIONS_AI</div>
      <div class="badge">Weekly</div>
    </div>
    <div class="header-sub">Análisis de opciones con IA · Contratos semanales</div>
  </header>

  <!-- FORM PAGE -->
  <div id="page-form">
    <div class="content">
      <div class="card fade-in">
        <div class="card-title">Nueva Análisis</div>

        <div class="field">
          <label>Ticker</label>
          <input class="ticker-input" id="tk" type="text" placeholder="AAPL" maxlength="6" autocomplete="off" autocorrect="off" spellcheck="false" />
        </div>

        <div class="row2">
          <div class="field">
            <label>Riesgo</label>
            <select id="rk">
              <option value="conservador">Conservador</option>
              <option value="moderado" selected>Moderado</option>
              <option value="agresivo">Agresivo</option>
            </select>
          </div>
          <div class="field">
            <label>Contratos</label>
            <input type="number" id="ct" value="2" min="1" max="100" />
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label>Tipo</label>
            <select id="tipo">
              <option value="IA decide">IA decide</option>
              <option value="CALL">Solo CALL</option>
              <option value="PUT">Solo PUT</option>
            </select>
          </div>
          <div class="field">
            <label>Capital</label>
            <input type="text" id="cap" placeholder="$500" />
          </div>
        </div>

        <button class="btn-analyze" id="btnAnalyze" onclick="analyze()">ANALIZAR →</button>
      </div>

      <div class="loading" id="loading">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="loading-txt" id="loadingTxt">Analizando mercado...</div>
      </div>

      <div id="result"></div>
    </div>
  </div>

  <!-- HISTORY PAGE -->
  <div id="page-history">
    <div class="content">
      <div class="card fade-in">
        <div class="card-title">Historial</div>
        <div id="historyContent"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="showPage('form')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      Analizar
    </button>
    <button class="nav-btn" id="nav-hist" onclick="showPage('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      Historial
    </button>
  </nav>
</div>

<script>
// Splash
setTimeout(() => document.getElementById('splash').classList.add('hide'), 1800);

// History storage
let history = JSON.parse(localStorage.getItem('optionsHistory') || '[]');

function showPage(page) {
  document.getElementById('page-form').classList.toggle('hidden', page !== 'form');
  document.getElementById('page-history').classList.toggle('active', page === 'history');
  document.getElementById('nav-home').classList.toggle('active', page === 'form');
  document.getElementById('nav-hist').classList.toggle('active', page === 'history');
  if (page === 'history') renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyContent');
  if (history.length === 0) {
    el.innerHTML = `<div class="history-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>Sin análisis aún</div></div>`;
    return;
  }
  el.innerHTML = history.slice().reverse().map(h => `
    <div class="hist-item">
      <div class="hist-top">
        <div class="hist-ticker">${h.ticker}</div>
        <div class="hist-date">${h.date}</div>
      </div>
      <div class="hist-bottom">
        <span class="hist-tag ${h.rec === 'CALL' ? 'badge-call' : h.rec === 'PUT' ? 'badge-put' : 'badge-neutral'}">${h.rec}</span>
        <span class="hist-tag" style="background:rgba(255,255,255,0.05);color:var(--muted)">Strike: ${h.strike}</span>
        <span class="hist-tag" style="background:rgba(255,255,255,0.05);color:var(--muted)">${h.riesgo}</span>
      </div>
    </div>
  `).join('');
}

const loadingMsgs = ['Analizando mercado...', 'Evaluando tendencias...', 'Calculando strikes...', 'Preparando recomendación...'];
let loadingInterval;

async function analyze() {
  const tk = document.getElementById('tk').value.trim().toUpperCase();
  const rk = document.getElementById('rk').value;
  const ct = document.getElementById('ct').value || '2';
  const tipo = document.getElementById('tipo').value;
  const cap = document.getElementById('cap').value || 'no especificado';
  if (!tk) { document.getElementById('tk').focus(); return; }

  const btn = document.getElementById('btnAnalyze');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const loadingTxt = document.getElementById('loadingTxt');

  btn.disabled = true;
  loading.classList.add('show');
  result.className = '';
  result.innerHTML = '';

  let mi = 0;
  loadingInterval = setInterval(() => { loadingTxt.textContent = loadingMsgs[mi++ % loadingMsgs.length]; }, 1800);

  const today = new Date();
  const expDate = new Date(today); expDate.setDate(today.getDate() + 7);
  const expStr = expDate.toLocaleDateString('es-MX', {day:'numeric',month:'short',year:'numeric'});

  const prompt = `Eres un analista experto en opciones del mercado de EE.UU. Analiza ${tk} y recomienda una opción semanal. Tipo: ${tipo}. Riesgo: ${rk}. Capital: ${cap}. Contratos: ${ct}. Fecha hoy: ${today.toLocaleDateString('es-MX')}. Expiración máx: ${expStr}.

Responde SOLO con JSON válido sin markdown ni texto extra:
{
  "ticker": "${tk}",
  "precio_actual": string,
  "tendencia": "Alcista"|"Bajista"|"Lateral",
  "sentimiento": "Positivo"|"Negativo"|"Neutro",
  "recomendacion": "CALL"|"PUT"|"NEUTRAL",
  "confianza": number 1-100,
  "strike": string,
  "expiracion": string,
  "prima": string,
  "costo_total": string,
  "take_profit": string,
  "stop_loss": string,
  "nivel_riesgo": number 1-10,
  "analisis_tecnico": string 2-3 oraciones,
  "analisis_fundamental": string 2-3 oraciones,
  "justificacion": string 2-3 oraciones,
  "catalistas": [string, string, string],
  "riesgos": [string, string]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'Eres un analista experto en opciones financieras. Responde ÚNICAMENTE con JSON válido, sin texto adicional, sin markdown, sin bloques de código.',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    let raw = (data.content||[]).filter(x=>x.type==='text').map(x=>x.text).join('');
    raw = raw.replace(/```json|```/g,'').trim();
    const m = raw.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('Respuesta inválida');
    const d = JSON.parse(m[0]);

    clearInterval(loadingInterval);
    loading.classList.remove('show');

    const rc = d.recomendacion === 'CALL' ? 'call' : d.recomendacion === 'PUT' ? 'put' : 'neutral';
    const color = rc === 'call' ? 'var(--accent)' : rc === 'put' ? 'var(--red)' : 'var(--accent2)';
    const riskColor = d.nivel_riesgo <= 3 ? 'var(--accent)' : d.nivel_riesgo <= 6 ? '#ffaa00' : 'var(--red)';
    const cats = (d.catalistas||[]).map(c=>`<li>${c}</li>`).join('');
    const risks = (d.riesgos||[]).map(r=>`<li>${r}</li>`).join('');
    const tendArrow = d.tendencia==='Alcista'?'↑':d.tendencia==='Bajista'?'↓':'→';

    result.className = 'show';
    result.innerHTML = `
      <div class="rec-card rec-${rc} fade-in">
        <div class="rec-top">
          <div class="rec-ticker">${d.ticker}</div>
          <div class="rec-badge badge-${rc}">${d.recomendacion}</div>
        </div>
        <div class="rec-price">${d.precio_actual}</div>
        <div class="rec-trend">${tendArrow} ${d.tendencia} · ${d.sentimiento}</div>
        <div class="conf-wrap">
          <div class="conf-label"><span>Confianza</span><span style="color:${color}">${d.confianza}%</span></div>
          <div class="conf-track"><div class="conf-fill" style="width:${d.confianza}%;background:${color}"></div></div>
        </div>
      </div>

      <div class="card fade-in">
        <div class="card-title" style="color:${color}">Opción recomendada</div>
        <div class="option-box">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Strike · Expiración</div>
          <div style="font-family:'Space Mono',monospace;font-size:18px;font-weight:700;margin-bottom:10px">${d.strike} · ${d.expiracion}</div>
          <div class="option-grid">
            <div class="opt-item"><span class="opt-key">Prima/contrato</span><span class="opt-val">${d.prima}</span></div>
            <div class="opt-item"><span class="opt-key">Costo total</span><span class="opt-val">${d.costo_total}</span></div>
            <div class="opt-item"><span class="opt-key">Contratos</span><span class="opt-val">${ct}</span></div>
            <div class="opt-item"><span class="opt-key">Perfil</span><span class="opt-val" style="text-transform:capitalize">${rk}</span></div>
          </div>
        </div>
        <div class="risk-wrap" style="margin-top:14px">
          <div class="risk-label-row"><span>Nivel de riesgo</span><span style="color:${riskColor}">${d.nivel_riesgo}/10</span></div>
          <div class="risk-track"><div class="risk-fill" style="width:${d.nivel_riesgo*10}%;background:${riskColor}"></div></div>
        </div>
      </div>

      <div class="card fade-in">
        <div class="card-title">Objetivos de salida</div>
        <div class="exit-grid">
          <div class="exit-card exit-tp">
            <div class="exit-label">Take Profit +50%</div>
            <div class="exit-price" style="color:var(--accent)">${d.take_profit}</div>
            <div class="exit-pct">Vende aquí ✓</div>
          </div>
          <div class="exit-card exit-sl">
            <div class="exit-label">Stop Loss -50%</div>
            <div class="exit-price" style="color:var(--red)">${d.stop_loss}</div>
            <div class="exit-pct">Cierra aquí ✗</div>
          </div>
        </div>
      </div>

      <div class="card fade-in">
        <div class="card-title">Justificación</div>
        <div class="analysis-txt">${d.justificacion}</div>
      </div>

      <div class="card fade-in">
        <div class="card-title">Análisis técnico</div>
        <div class="analysis-txt">${d.analisis_tecnico}</div>
      </div>

      <div class="card fade-in">
        <div class="card-title">Análisis fundamental</div>
        <div class="analysis-txt">${d.analisis_fundamental}</div>
      </div>

      <div class="card fade-in">
        <div class="card-title" style="color:var(--accent)">Catalizadores</div>
        <ul class="cat-list">${cats}</ul>
      </div>

      <div class="card fade-in">
        <div class="card-title" style="color:var(--red)">Riesgos</div>
        <ul class="cat-list risk-list">${risks}</ul>
      </div>

      <div class="disclaimer fade-in">⚠️ Este análisis es educativo y no constituye asesoramiento financiero. Las opciones implican riesgo de pérdida total del capital. Consulta con un asesor antes de operar con dinero real.</div>
    `;

    // Save to history
    history.push({ ticker: d.ticker, rec: d.recomendacion, strike: d.strike, riesgo: rk, date: new Date().toLocaleDateString('es-MX') });
    if (history.length > 20) history.shift();
    localStorage.setItem('optionsHistory', JSON.stringify(history));

  } catch(e) {
    clearInterval(loadingInterval);
    loading.classList.remove('show');
    result.className = 'show';
    result.innerHTML = `<div class="card fade-in"><div style="color:var(--red);font-size:14px">Error: ${e.message}</div></div>`;
  }
  btn.disabled = false;
}

document.getElementById('tk').addEventListener('keydown', e => { if(e.key==='Enter') analyze(); });
document.getElementById('tk').addEventListener('input', e => { e.target.value = e.target.value.toUpperCase(); });

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
